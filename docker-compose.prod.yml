name: tenhub-prod

services:
  db:
    image: mysql:8.0
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 10

  cache:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_PUBLIC_URL:-http://localhost/search/}
    volumes:
      - searxng-data:/etc/searxng

  auth:
    build:
      context: .
      dockerfile: docker/go-service.Dockerfile
      args:
        SERVICE: auth
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      GRPC_PORT_AUTH: 50051
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./services/auth/keys:/app/services/auth/keys:ro
      - auth-logs:/app/services/auth/logs
    depends_on:
      db:
        condition: service_healthy

  wiki:
    build:
      context: .
      dockerfile: docker/go-service.Dockerfile
      args:
        SERVICE: wiki
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: cache
      REDIS_PORT: 6379
      GRPC_PORT: 50052
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - wiki-logs:/app/services/wiki/logs
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy

  profile:
    build:
      context: .
      dockerfile: docker/go-service.Dockerfile
      args:
        SERVICE: profile
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      GRPC_PORT_PROFILE: 50053
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - profile-logs:/app/services/profile/logs
    depends_on:
      db:
        condition: service_healthy

  ai:
    build:
      context: .
      dockerfile: docker/go-service.Dockerfile
      args:
        SERVICE: ai
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      GRPC_PORT_AI: 50054
      WIKI_ADDR: wiki:50052
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:1b}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      SEARXNG_URL: http://searxng:8080
      LOG_LEVEL: ${LOG_LEVEL:-info}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ai-logs:/app/services/ai/logs
    depends_on:
      wiki:
        condition: service_started
      searxng:
        condition: service_started

  gateway:
    build:
      context: .
      dockerfile: docker/go-service.Dockerfile
      args:
        SERVICE: gateway
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      GATEWAY_PORT: 8080
      AUTH_ADDR: auth:50051
      WIKI_ADDR: wiki:50052
      PROFILE_ADDR: profile:50053
      AI_ADDR: ai:50054
      UPLOAD_DIR: /app/services/gateway/uploads
      ALLOWED_ORIGIN: ${PUBLIC_ORIGIN}
      ALLOWED_METHODS: ${ALLOWED_METHODS:-GET,POST,PUT,DELETE,OPTIONS}
      ALLOWED_HEADERS: ${ALLOWED_HEADERS:-Content-Type,Authorization}
      ALLOWED_CREDENTIALS: ${ALLOWED_CREDENTIALS:-true}
      AI_ANON_MAX_CONCURRENT: ${AI_ANON_MAX_CONCURRENT:-1}
      AI_ANON_DAILY_LIMIT: ${AI_ANON_DAILY_LIMIT:-5}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    volumes:
      - gateway-uploads:/app/services/gateway/uploads
      - gateway-logs:/app/services/gateway/logs
    depends_on:
      auth:
        condition: service_started
      wiki:
        condition: service_started
      profile:
        condition: service_started
      ai:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      SERVER_API_URL: http://gateway:8080/api
      GATEWAY_INTERNAL_URL: http://gateway:8080
    depends_on:
      gateway:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      SERVER_NAME: ${SERVER_NAME:-_}
      SSL_ENABLED: ${SSL_ENABLED:-false}
    volumes:
      - ./deploy/nginx/templates:/etc/nginx/templates:ro
      - nginx-cache:/var/cache/nginx
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      frontend:
        condition: service_started

volumes:
  mysql-data:
  redis-data:
  searxng-data:
  gateway-uploads:
  auth-logs:
  wiki-logs:
  profile-logs:
  ai-logs:
  gateway-logs:
  nginx-cache:
