# Docker Compose project名。
# named volume名やコンテナ名のprefixとして使われます。
# 例: tenhub-prod_mysql-data
name: tenhub-prod

# ============================================
# 本番環境 Docker Compose 設定
# ============================================
# GitHub Container Registry (GHCR) からイメージをプル
# イメージタグは .env.production の DOCKER_IMAGE_TAG で指定
#
# 重要:
#   このファイルは「VPSでどう起動するか」を定義します。
#   Docker imageを作るのはGitHub Actionsです。
#   先にGitHub ActionsでGHCRへpushされていないと、docker compose pullは失敗します。
#
# デプロイ手順:
#   1. GitHub Actions でイメージをビルド&プッシュ
#   2. VPS で docker compose pull
#   3. docker compose up -d
# ============================================

# services:
#   起動するコンテナ一覧です。
#   db/cache/auth/wiki/profile/ai/gateway/frontend/nginx がそれぞれ1つのサービスです。
services:
  # ============================================
  # データストア
  # ============================================
  db:
    # MySQL公式imageを使います。
    image: mysql:8.0
    # MySQLの文字コードをutf8mb4に固定します。
    # 日本語、絵文字、Markdown本文を安全に保存するためです。
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    # VPS再起動やDocker再起動後に自動復旧します。
    # 手動でstopした場合は勝手に再起動しません。
    restart: unless-stopped
    # .env.production を読み込みます。
    # required: false にしているため、ファイルがなくてもCompose構文確認はできます。
    # ただし本番起動時には必ず /opt/tenhub/.env.production を用意します。
    env_file:
      - path: .env.production
        required: false
    # environment:
    #   コンテナ内のプロセスへ渡す環境変数です。
    #   MySQL公式imageは、初回起動時にこの値を使ってDB/ユーザーを作ります。
    environment:
      # rootユーザー用パスワード。管理者権限なので強い値にします。
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      # アプリ用DB名。現在はauth/wiki/profileが同じDBを使います。
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      # アプリ用DBユーザー名。
      MYSQL_USER: ${MYSQL_USER}
      # アプリ用DBユーザーのパスワード。
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      # MySQLの実データをDocker named volumeに保存します。
      # コンテナを作り直してもDBデータを残すためです。
      - mysql-data:/var/lib/mysql
    healthcheck:
      # MySQLが起動して接続可能か確認します。
      # depends_on condition: service_healthy で利用します。
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 10

  cache:
    # Redisはwikiなどのキャッシュ用途です。
    # alpine版は軽量です。
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      # Redisのデータを残します。
      # キャッシュ用途でも、再起動時の復元や調査に使えます。
      - redis-data:/data
    healthcheck:
      # Redisが応答できるか確認します。
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

  searxng:
    # AI/RAG検索用のメタ検索エンジンです。
    # 外部検索を直接叩くのではなく、searxng経由に寄せます。
    image: searxng/searxng:latest
    restart: unless-stopped
    environment:
      # searxngが自分の公開URLを知るための値です。
      # ドメイン未取得時はlocalhost/searchでも起動自体はできます。
      SEARXNG_BASE_URL: ${SEARXNG_PUBLIC_URL:-http://localhost/search/}
    volumes:
      # searxng設定を保持します。
      - searxng-data:/etc/searxng

  # ============================================
  # Go マイクロサービス（GHCRからプル）
  # ============================================
  auth:
    # ${...:-...} は「環境変数がなければ右側のdefaultを使う」という意味です。
    # 例:
    #   DOCKER_REGISTRY=ghcr.io
    #   DOCKER_IMAGE_NAMESPACE=tenshoohashi/knowhub
    #   DOCKER_IMAGE_TAG=latest
    #   => ghcr.io/tenshoohashi/knowhub/auth:latest
    # GitHubアカウント表示名は TenshoOHASHI ですが、
    # Docker image名は小文字が安全なため、image pathは小文字で統一します。
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_IMAGE_NAMESPACE:-tenshoohashi/knowhub}/auth:${DOCKER_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      # Docker Compose内では、service名 db がDNS名になります。
      # Goコード側では os.Getenv("MYSQL_HOST") で読みます。
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      # auth gRPC serverの待ち受けポートです。
      # gatewayは AUTH_ADDR=auth:50051 で接続します。
      GRPC_PORT_AUTH: 50051
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      # JWT署名用の秘密鍵/公開鍵をauthコンテナに読み取り専用で渡します。
      - ./services/auth/keys:/app/services/auth/keys:ro
      # authサービスのログをDocker volumeへ保存します。
      - auth-logs:/app/services/auth/logs
    depends_on:
      # MySQLがhealthyになってからauthを起動します。
      db:
        condition: service_healthy

  wiki:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_IMAGE_NAMESPACE:-tenshoohashi/knowhub}/wiki:${DOCKER_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      # Redisの接続先です。service名 cache がDocker内部DNS名になります。
      REDIS_HOST: cache
      REDIS_PORT: 6379
      # wiki gRPC serverの待ち受けポートです。
      GRPC_PORT: 50052
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - wiki-logs:/app/services/wiki/logs
    depends_on:
      # wikiはDBとRedisの両方が必要です。
      db:
        condition: service_healthy
      cache:
        condition: service_healthy

  profile:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_IMAGE_NAMESPACE:-tenshoohashi/knowhub}/profile:${DOCKER_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      # profile gRPC serverの待ち受けポートです。
      GRPC_PORT_PROFILE: 50053
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - profile-logs:/app/services/profile/logs
    depends_on:
      db:
        condition: service_healthy

  # ai:
  #   LLM/RAG関連の処理を担当します。
  #   gatewayから gRPC で呼ばれます。
  ai:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_IMAGE_NAMESPACE:-tenshoohashi/knowhub}/ai:${DOCKER_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      # ai gRPC serverの待ち受けポートです。
      GRPC_PORT_AI: 50054
      # aiサービスがwikiサービスへ問い合わせるための内部アドレスです。
      WIKI_ADDR: wiki:50052
      # Ollamaの接続先です。
      # host.docker.internal は「コンテナからVPSホスト本体へ行く」ための名前です。
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:1b}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      # searxngコンテナへの内部URLです。
      SEARXNG_URL: http://searxng:8080
      LOG_LEVEL: ${LOG_LEVEL:-info}
    extra_hosts:
      # Linux Dockerで host.docker.internal を使えるようにする設定です。
      - 'host.docker.internal:host-gateway'
    volumes:
      - ai-logs:/app/services/ai/logs
    depends_on:
      # aiはwikiとsearxngが起動していれば開始します。
      # DBに直接依存せず、wiki経由でデータを扱います。
      wiki:
        condition: service_started
      searxng:
        condition: service_started

  # .envを2段構えで使います。
  # .env.production:
  #   Docker Composeの設計図に値を渡すファイルです。
  #   例: image名、公開URL、DB password。
  #
  # environment:
  #   コンテナの中のプログラムへ値を渡す場所です。
  #   Goコード側では os.Getenv("AUTH_ADDR") のように読みます。
  gateway:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_IMAGE_NAMESPACE:-tenshoohashi/knowhub}/gateway:${DOCKER_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    # goのos.Getenv("AUTH_ADDR")に読み込まれる
    environment:
      # gatewayのHTTP server待ち受けポートです。
      # nginxは gateway:8080 にproxyします。
      GATEWAY_PORT: 8080
      # authサービス + ポート番号でDocker内部からアクセスします。
      AUTH_ADDR: auth:50051
      WIKI_ADDR: wiki:50052
      PROFILE_ADDR: profile:50053
      AI_ADDR: ai:50054
      # ファイルアップロードの保存先です。
      UPLOAD_DIR: /app/services/gateway/uploads
      # CORSで許可するブラウザ側originです。
      ALLOWED_ORIGIN: ${PUBLIC_ORIGIN}
      ALLOWED_METHODS: ${ALLOWED_METHODS:-GET,POST,PUT,DELETE,OPTIONS}
      ALLOWED_HEADERS: ${ALLOWED_HEADERS:-Content-Type,Authorization}
      # cookieなどcredential付きリクエストを許可する設定です。
      ALLOWED_CREDENTIALS: ${ALLOWED_CREDENTIALS:-true}
      # 未ログインAI利用者の同時実行数制限です。
      AI_ANON_MAX_CONCURRENT: ${AI_ANON_MAX_CONCURRENT:-1}
      # 未ログインAI利用者の日次回数制限です。
      AI_ANON_DAILY_LIMIT: ${AI_ANON_DAILY_LIMIT:-5}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Slack通知を使わない場合は空でOKです。
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    volumes:
      # アップロードされたファイルを保存します。
      - gateway-uploads:/app/services/gateway/uploads
      - gateway-logs:/app/services/gateway/logs
    depends_on:
      # gatewayは各gRPCサービスへ接続するため、先に起動している必要があります。
      auth:
        condition: service_started
      wiki:
        condition: service_started
      profile:
        condition: service_started
      ai:
        condition: service_started

  # ============================================
  # フロントエンド（GHCRからプル）
  # ============================================
  frontend:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_IMAGE_NAMESPACE:-tenshoohashi/knowhub}/frontend:${DOCKER_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      # Next.js server側からgatewayへアクセスするURLです。
      # browserから直接見えるURLではなく、Docker内部URLです。
      SERVER_API_URL: http://gateway:8080/api
      # Next.js route handlerがgatewayへserver-to-server通信するためのURLです。
      GATEWAY_INTERNAL_URL: http://gateway:8080
    depends_on:
      gateway:
        condition: service_started

  # ============================================
  # リバースプロキシ (Nginx)
  # 全ての外部リクエストを受け取り、適切なサービスへ振り分ける
  # ============================================
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    # 起動時に実行するシェルスクリプト
    command: >
      /bin/sh -c '
        # SSL（HTTPS）が有効な場合
        if [ "$$SSL_ENABLED" = "true" ]; then
          # SSL用テンプレート内の変数を展開して本番設定を作成、<入力ダイレクト、左から右のファイルに流し込む、>出力リダイレクト、右側のファイルとして保存
          envsubst "$$SERVER_NAME" < /etc/nginx/app-templates/ssl.conf.template > /etc/nginx/conf.d/default.conf;
        else
          # HTTP（未暗号化）用テンプレートを使用して設定を作成（初期設定や証明書取得用）
          envsubst "$$SERVER_NAME" < /etc/nginx/app-templates/http.conf.template > /etc/nginx/conf.d/default.conf;
        fi;
        # 設定完了後、Nginxを起動
        nginx -g "daemon off;";
      '
    ports:
      - '80:80' # HTTPポートの開放
      - '443:443' # HTTPSポートの開放
    environment:
      # .envから取得。未設定なら "_"（全受け）
      SERVER_NAME: ${SERVER_NAME:-_}
      # 初期構築時は false、SSL証明書取得後に true に書き換える
      SSL_ENABLED: ${SSL_ENABLED:-false}
    #　nginx本体はコンテン内で動いているため、コンテナ内でホストにデータを同期・キャッシュさせる
    volumes:
      # 1. Nginx設定のひな型（roは読み取り専用）、Ubuntu側のホストの実際のパスをコンテナ内に繋ぐ（同期させる）
      # dockerを止めずに、nginxの設定を再起動、docker compose exec nginx nginx -s reload
      - ./deploy/nginx/templates:/etc/nginx/app-templates:ro
      # 2. Certbot（無料SSL発行ツール）との認証用フォルダ
      - /var/www/certbot:/var/www/certbot:ro
      # 3. Nginxのキャッシュ（高速化用）
      - nginx-cache:/var/cache/nginx
      # 4. 発行されたSSL証明書本体（読み取り専用）
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      frontend:
        condition: service_started

# ============================================
# ボリューム定義
# ============================================
# named volume で明示的に名前を指定
# これにより、バックアップスクリプトから確実に参照できる
volumes:
  # /var/lib/docker/volumes/tenhub-prod_xxxx/_dataに保存される
  mysql-data:
    # dockerの管理システム上で表示される本命を指定することで、バックアップしやすくなる
    name: tenhub-prod_mysql-data
  redis-data:
    name: tenhub-prod_redis-data
  searxng-data:
    name: tenhub-prod_searxng-data
  gateway-uploads:
    name: tenhub-prod_gateway-uploads
  auth-logs:
    name: tenhub-prod_auth-logs
  wiki-logs:
    name: tenhub-prod_wiki-logs
  profile-logs:
    name: tenhub-prod_profile-logs
  ai-logs:
    name: tenhub-prod_ai-logs
  gateway-logs:
    name: tenhub-prod_gateway-logs
  nginx-cache:
    name: tenhub-prod_nginx-cache
