name: Test

# このworkflowは2通りで実行されます。
#
# 1. push / pull_request:
#    main または develop に変更が入った時、自動でテストします。
#
# 2. workflow_call:
#    deploy.yml など、別のworkflowから再利用workflowとして呼び出されます。
#    deploy.yml 側の `uses: ./.github/workflows/test.yml` は、この設定がないと失敗します。
on:
  # main/developへpushされた時に単体でテストを実行します。
  push:
    branches: [main, develop]
  # main/develop向けPRが作成・更新された時にテストを実行します。
  pull_request:
    branches: [main, develop]
  # 他のworkflowから `uses: ./.github/workflows/test.yml` で呼び出せるようにします。
  # このキーがないと、deploy.yml 側で
  # "workflow_call key is not defined in the referenced workflow" が出ます。
  workflow_call:

jobs:
  # Goサービス群のテストです。
  # auth/wiki/profile/ai/gateway をサービス単位でテストします。
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest

    steps:
      # GitHub Actionsの一時環境へリポジトリのコードを取得します。
      - name: Checkout code
        uses: actions/checkout@v4

      # Goをインストールします。
      # go-versionはプロジェクトで使うGoバージョンに合わせます。
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      # -v:
      #   詳細ログを表示します。
      # -race:
      #   goroutineのデータ競合を検出します。
      # -coverprofile:
      #   カバレッジ結果をcoverage.outへ出力します。
      # ./...:
      #   現在ディレクトリ配下の全packageをテストします。
      - name: Go Test - Auth Service
        working-directory: services/auth
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Go Test - Wiki Service
        working-directory: services/wiki
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Go Test - Profile Service
        working-directory: services/profile
        run: go test -v -race -coverprofile=coverage.out ./...

      # AIサービスは外部処理・重めの処理を含む可能性があるため、timeoutを明示します。
      - name: Go Test - AI Service
        working-directory: services/ai
        run: go test -v -race -coverprofile=coverage.out ./... -timeout 5m

      - name: Go Test - Gateway
        working-directory: services/gateway
        run: go test -v -race -coverprofile=coverage.out ./...

  # Frontendの型チェック、lint、build確認です。
  # production imageを作る前に、Next.jsがbuildできる状態か確認します。
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Node.jsをインストールします。
      # cache: npm により、npm依存の取得を高速化します。
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # package-lock.json通りに依存をインストールします。
      # CIでは npm install より npm ci が再現性の面で適しています。
      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # TypeScriptの型エラーを確認します。
      # --noEmit なので、JSファイルは生成しません。
      - name: Run TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      # ESLintでコード品質を確認します。
      # --max-warnings 0 により、warningもCI失敗扱いにします。
      - name: Run ESLint
        working-directory: frontend
        run: npx eslint . --max-warnings 0

      # Next.jsの本番buildが成功するか確認します。
      - name: Build Next.js
        working-directory: frontend
        run: npm run build

  # docker-compose.yml が開発用Compose設定として解釈できるか確認します。
  # 実際にコンテナ起動はせず、構文と変数展開だけ検証します。
  #
  # 注意:
  #   docker-compose.prod.yml / .env.production.example は本番構成を含むためGit管理から外しています。
  #   そのためCIでは参照しません。PRでは、Gitに存在する開発用Composeだけを検証します。
  docker-compose-validation:
    name: Docker Compose Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # docker-compose.yml は ${MYSQL_PASSWORD} のような環境変数を参照します。
      # CIでは本物の値を使わず、構文検証用のダミー値だけを渡します。
      # > /dev/null は、展開結果を表示せず、成功/失敗だけを見るためです。
      - name: Validate development compose
        env:
          MYSQL_ROOT_PASSWORD: ci-root-password
          MYSQL_DATABASE: ci_database
          MYSQL_USER: ci_user
          MYSQL_PASSWORD: ci-app-password
        run: |
          docker compose -f docker-compose.yml config > /dev/null

  # テスト結果だけをSlackへ通知します。
  #
  # 重要:
  #   Webhook URL は workflow に直接書きません。
  #   GitHub repository の Settings > Secrets and variables > Actions に
  #   SLACK_WEBHOOK_URL という名前で登録します。
  #
  # 安全性:
  #   - Secret が未設定なら通知せず、そのまま成功として終了します。
  #   - Slack通知に失敗しても、テスト結果そのものは変えません。
  #   - PR / push / workflow_call のどれでも、テストjob完了後に結果をまとめます。
  #
  # 文法:
  #   needs:
  #     このjobが待つjobを指定します。
  #     ここでは Go / Frontend / Compose の3つのテスト結果を待ちます。
  #
  #   if: always()
  #     前のjobが失敗しても、このjobを実行する指定です。
  #     これがないと、テスト失敗時に通知job自体がskipされ、Slackへ失敗通知できません。
  #
  #   steps:
  #     jobの中で実行する処理の一覧です。
  #     ここではSlackへPOSTする1ステップだけを定義しています。
  slack-notification:
    name: Slack Notification
    runs-on: ubuntu-latest

    # needs:
    #   この通知jobが依存するjobです。
    #   3つのjobが終わるまで待ち、結果を needs.<job-id>.result で参照します。
    needs:
      - go-test
      - frontend-test
      - docker-compose-validation

    # if: always():
    #   依存jobが成功・失敗・キャンセルのどれでも、このjobを実行します。
    #   Slack通知は「失敗したことを知らせる」用途もあるため、always() が必要です。
    if: always()

    # steps:
    #   slack-notification job内で実際に実行する処理です。
    #   GitHub Actionsでは、job -> steps -> step の順に処理を書きます。
    steps:
      - name: Send test result to Slack
        env:
          # GitHub Secrets から読むため、workflow上には実際のURLは表示されません。
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

          # needs.<job-id>.result で、各テストjobの結果を取得します。
          # 値は success / failure / cancelled / skipped などです。
          GO_RESULT: ${{ needs.go-test.result }}
          FRONTEND_RESULT: ${{ needs.frontend-test.result }}
          COMPOSE_RESULT: ${{ needs.docker-compose-validation.result }}

          # Slack本文に表示するためのGitHub Actions実行情報です。
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL is not set. Skip Slack notification."
            exit 0
          fi

          STATUS="success"
          LABEL="[OK]"
          if [ "$GO_RESULT" != "success" ] || [ "$FRONTEND_RESULT" != "success" ] || [ "$COMPOSE_RESULT" != "success" ]; then
            STATUS="failed"
            LABEL="[FAILED]"
          fi

          PAYLOAD=$(jq -n \
            --arg text "$LABEL Test $STATUS: $GITHUB_REPOSITORY ($GITHUB_REF_NAME)" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg branch "$GITHUB_REF_NAME" \
            --arg event "$GITHUB_EVENT_NAME" \
            --arg actor "$GITHUB_ACTOR" \
            --arg go "$GO_RESULT" \
            --arg frontend "$FRONTEND_RESULT" \
            --arg compose "$COMPOSE_RESULT" \
            --arg url "$WORKFLOW_URL" \
            '{
              text: $text,
              blocks: [
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: ("*" + $text + "*")
                  }
                },
                {
                  type: "section",
                  fields: [
                    { type: "mrkdwn", text: ("*Repository:*\n" + $repo) },
                    { type: "mrkdwn", text: ("*Branch:*\n" + $branch) },
                    { type: "mrkdwn", text: ("*Event:*\n" + $event) },
                    { type: "mrkdwn", text: ("*Actor:*\n" + $actor) },
                    { type: "mrkdwn", text: ("*Go:*\n" + $go) },
                    { type: "mrkdwn", text: ("*Frontend:*\n" + $frontend) },
                    { type: "mrkdwn", text: ("*Compose:*\n" + $compose) }
                  ]
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: ("<" + $url + "|Open GitHub Actions run>")
                  }
                }
              ]
            }')

          if ! curl -sS -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"; then
            echo "Slack notification failed, but test result is unchanged."
          fi
