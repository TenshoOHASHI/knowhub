name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run Tests
    uses: ./.github/workflows/test.yml

  build-and-push:
    name: Build and Push Images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Go services
        id: meta-go
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=true
            suffix=-${{ service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
        env:
          service: auth

      - name: Build and push Auth service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/go-service.Dockerfile
          build-args: SERVICE=auth
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/auth:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/auth:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Wiki service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/go-service.Dockerfile
          build-args: SERVICE=wiki
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/wiki:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/wiki:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Profile service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/go-service.Dockerfile
          build-args: SERVICE=profile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/profile:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/profile:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push AI service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/go-service.Dockerfile
          build-args: SERVICE=ai
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ai:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Gateway service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/go-service.Dockerfile
          build-args: SERVICE=gateway
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/gateway:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/tenhub' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts

      - name: Create deploy directory
        run: |
          ssh -i ~/.ssh/deploy_key $VPS_USER@$VPS_HOST "mkdir -p $DEPLOY_PATH"

      - name: Copy files to VPS
        run: |
          scp -i ~/.ssh/deploy_key -r \
            docker-compose.prod.yml \
            deploy \
            $VPS_USER@$VPS_HOST:$DEPLOY_PATH/

      - name: Pull latest images
        run: |
          ssh -i ~/.ssh/deploy_key $VPS_USER@$VPS_HOST \
            "cd $DEPLOY_PATH && docker compose -f docker-compose.prod.yml pull"

      - name: Restart services
        run: |
          ssh -i ~/.ssh/deploy_key $VPS_USER@$VPS_HOST \
            "cd $DEPLOY_PATH && docker compose -f docker-compose.prod.yml up -d"

      - name: Health check
        run: |
          sleep 10
          response=$(curl -s -o /dev/null -w "%{http_code}" http://$VPS_HOST/ || echo "000")
          if [ "$response" != "200" ] && [ "$response" != "301" ] && [ "$response" != "302" ]; then
            echo "Health check failed with status code: $response"
            ssh -i ~/.ssh/deploy_key $VPS_USER@$VPS_HOST \
              "cd $DEPLOY_PATH && docker compose -f docker-compose.prod.yml logs --tail=50"
            exit 1
          fi
          echo "Health check passed with status code: $response"

      - name: Notify Slack on success
        if: success()
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
              -H 'Content-Type: application/json' \
              -d '{
                "text": "✅ TenHub deployed successfully",
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Deployment Success*\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}\n*Branch:* ${{ github.ref_name }}"
                    }
                  }
                ]
              }'
          fi

      - name: Notify Slack on failure
        if: failure()
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
              -H 'Content-Type: application/json' \
              -d '{
                "text": "❌ TenHub deployment failed",
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Deployment Failed*\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}\n*Branch:* ${{ github.ref_name }}\n\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                    }
                  }
                ]
              }'
          fi
