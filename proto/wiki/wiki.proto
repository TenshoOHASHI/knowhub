syntax = "proto3";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";


package wiki;

option go_package = "github.com/TenshoOHASHI/knowhub/proto/wiki";


// 記事の型を定義
message Article {
  string id=1;
  string title=2;
  string content=3;
  string category_id = 4;          // 追加
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  string visibility = 7;

}


// 記事を取得
message CreateArticleRequest {
  string title = 1;
  string content = 2;
  string category_id = 3;
  string visibility = 4;
}

// 記事を返す
message CreateArticleResponse {
  Article article = 1;
}

// 特定の記事を取得
message GetArticleRequest {
  string id = 1;
}

// 特定の記事を返す
message GetArticleResponse {
  Article Article = 1;
}

// 全記事を取得
message ListArticleRequest {
 // ページネーション等は後で
}

// 複数の記事を返す
message ListArticleResponse {
  repeated Article article = 1; // 複数記事
}

// 記事を更新（部分更新）
message UpdateArticleRequest {
  string id = 1;
  optional string title = 2;
  optional string content = 3;
  optional string visibility = 4;
  }


// 更新した記事を返す
message UpdateArticleResponse {
  Article article = 1;
}

// 特定の記事を削除
message DeleteArticleRequest {
  string id = 1;
}


// 削除した結果を返す
message DeleteArticleResponse {

}

// 記事の状態
enum ArticleStatus {
    ARTICLE_STATUS_UNSPECIFIED = 0;  // proto3の慣例: 0は「未指定」
    ARTICLE_STATUS_DRAFT = 1;        // 下書き
    ARTICLE_STATUS_PUBLISHED = 2;    // 公開済み
    ARTICLE_STATUS_ARCHIVED = 3;     // アーカイブ
  }

  // ユーザーロール
  enum Role {
    ROLE_UNSPECIFIED = 0;
    ROLE_ADMIN = 1;     // 投稿・編集可能（あなた）
    ROLE_VIEWER = 2;    // 閲覧のみ（その他）
  }


// proto-gen-validateの例（参考）：
// message CreateArticleRequest {
//   string title = 1 [(validate.rules).string = {
//     min_len: 1,        // 1文字以上
//     max_len: 200       // 200文字以内
//   }];
//   string content = 2 [(validate.rules).string = {
//     min_len: 1
//   }];
// }

message Category {
    string id = 1;
    string name = 2;
    string parent_id = 3;   // 親カテゴリID（空文字 = ルート）
  }

// カテゴリ一覧取得
message ListCategoriesRequest {}

message ListCategoriesResponse {
  repeated Category categories = 1;
}

// カテゴリ作成
message CreateCategoryRequest {
  string name = 1;
  string parent_id = 2;   // 空文字 = ルートカテゴリ
}

message CreateCategoryResponse {
  Category category = 1;
}

message DeleteCategoryRequest {
  string id = 1;
}

// ===== Like / Save =====

message ToggleLikeRequest {
  string article_id = 1;
  string fingerprint = 2;
}

message ToggleLikeResponse {
  int32 count = 1;
  bool liked = 2;
}

message GetLikeCountRequest {
  string article_id = 1;
  string fingerprint = 2;
}

message GetLikeCountResponse {
  int32 count = 1;
  bool liked = 2;
}

message SaveArticleRequest {
  string article_id = 1;
  string fingerprint = 2;
}

message SaveArticleResponse {
  bool saved = 1;
}

message UnsaveArticleRequest {
  string article_id = 1;
  string fingerprint = 2;
}

message UnsaveArticleResponse {
  bool unsaved = 1;
}

message ListSavedArticlesRequest {
  string fingerprint = 1;
}

message ListSavedArticlesResponse {
  repeated Article articles = 1;
}

message IsArticleSavedRequest {
  string article_id = 1;
  string fingerprint = 2;
}

message IsArticleSavedResponse {
  bool saved = 1;
}

message GetLikeCountsRequest {
  repeated string article_ids = 1;
}

message ArticleLikeCount {
  string article_id = 1;
  int32 count = 2;
}

message GetLikeCountsResponse {
  repeated ArticleLikeCount counts = 1;
}

// ===== Analytics =====

message RecordPageViewRequest {
  string path = 1;
  string ip_hash = 2;
  string user_agent = 3;
  string referrer = 4;
}

message RecordPageViewResponse {}

message GetAnalyticsSummaryRequest {
  int32 days = 1; // 過去N日間
}

message DailyCount {
  string date = 1;
  int32 count = 2;
}

message GetAnalyticsSummaryResponse {
  int32 total_views = 1;
  int32 today_views = 2;
  repeated DailyCount daily_views = 3;
  repeated PageRanking page_ranking = 4;
}

message PageRanking {
  string path = 1;
  int32 count = 2;
}

service WikiServices {
  rpc Create(CreateArticleRequest) returns(CreateArticleResponse);
  rpc Get(GetArticleRequest) returns(GetArticleResponse);
  rpc List(ListArticleRequest) returns(ListArticleResponse);
  rpc Update(UpdateArticleRequest) returns(UpdateArticleResponse);
  rpc Delete(DeleteArticleRequest) returns(google.protobuf.Empty);

   // Category
  rpc ListCategories(ListCategoriesRequest) returns (ListCategoriesResponse);
  rpc CreateCategory(CreateCategoryRequest) returns (CreateCategoryResponse);
  rpc DeleteCategory(DeleteCategoryRequest) returns (google.protobuf.Empty);

  // Like / Save
  rpc ToggleLike(ToggleLikeRequest) returns(ToggleLikeResponse);
  rpc GetLikeCount(GetLikeCountRequest) returns(GetLikeCountResponse);
  rpc GetLikeCounts(GetLikeCountsRequest) returns(GetLikeCountsResponse);
  rpc SaveArticle(SaveArticleRequest) returns(SaveArticleResponse);
  rpc UnsaveArticle(UnsaveArticleRequest) returns(UnsaveArticleResponse);
  rpc ListSavedArticles(ListSavedArticlesRequest) returns(ListSavedArticlesResponse);
  rpc IsArticleSaved(IsArticleSavedRequest) returns(IsArticleSavedResponse);

  // Analytics
  rpc RecordPageView(RecordPageViewRequest) returns(RecordPageViewResponse);
  rpc GetAnalyticsSummary(GetAnalyticsSummaryRequest) returns(GetAnalyticsSummaryResponse);
}
