syntax = "proto3";

package ai;

option go_package = "github.com/TenshoOHASHI/knowhub/proto/ai";

service AIService {
  rpc SearchArticles(SearchRequest) returns (SearchResponse);
  rpc SummarizeArticle(SummarizeRequest) returns (SummarizeResponse);
  rpc AskQuestion(QuestionRequest) returns (QuestionResponse);
  rpc AskWithAgent(AgentQuestionRequest) returns (AgentQuestionResponse);
  rpc AskWithAgentStream(AgentQuestionRequest) returns (stream AgentStreamEvent);
  rpc GetKnowledgeGraph(GetKnowledgeGraphRequest) returns (GetKnowledgeGraphResponse);
  rpc GetRelatedArticles(GetRelatedArticlesRequest) returns (GetRelatedArticlesResponse);
  rpc InvalidateGraphCache(InvalidateGraphCacheRequest) returns (InvalidateGraphCacheResponse);
}


message Source {
  string article_id = 1;
  string title = 2;
}
message SearchRequest {
  string query = 1;
  int32 limit = 2;
}

message SearchResult {
  string article_id = 1;
  string title = 2;
  string content = 3;
  double relevance_score = 4;

}

message SearchResponse {
  repeated SearchResult results = 1;
}

message SummarizeRequest {
  string article_id = 1;
}

message SummarizeResponse {
  string summary = 1;
}

message QuestionRequest {
  string question = 1;
  string model = 2;
  string api_key = 3;
  string search_engine = 4; // "bm25", "vector", "hybrid", "graph"
}

message QuestionResponse {
  string answer = 1;
  repeated Source sources = 2;
}

// ナレッジグラフ関連
message EntityNode {
  string id = 1;
  string name = 2;
  string type = 3;
  repeated string article_ids = 4;
}

message RelationEdge {
  string source = 1;
  string target = 2;
  string label = 3;
}

message GetKnowledgeGraphRequest {}

message GetKnowledgeGraphResponse {
  repeated EntityNode entities = 1;
  repeated RelationEdge relations = 2;
}

message GetRelatedArticlesRequest {
  string article_id = 1;
  int32 max_hops = 2;
  int32 limit = 3;
}

message GetRelatedArticlesResponse {
  repeated SearchResult results = 1;
}

message InvalidateGraphCacheRequest {}

message InvalidateGraphCacheResponse {}

// ReAct Agent
message AgentQuestionRequest {
  string question = 1;
  string model = 2;
  string api_key = 3;
  string search_engine = 4;
  bool enable_web_search = 5;
  string history = 6; // JSON: [{"role":"user","content":"..."}, ...]
}

message AgentStep {
  string thought = 1;
  string action = 2;
  string action_input = 3;
  string observation = 4;
}

message AgentSource {
  string article_id = 1;
  string title = 2;
  string url = 3;
}

message AgentQuestionResponse {
  string answer = 1;
  repeated AgentStep steps = 2;
  repeated AgentSource sources = 3;
}

// Streaming events for AskWithAgentStream
message AgentStreamEvent {
  string event_type = 1;  // "step", "final_answer", "error"
  AgentStepEvent step = 2;
  AgentFinalEvent final = 3;
  AgentErrorEvent error = 4;
}

message AgentStepEvent {
  int32 step_index = 1;
  string thought = 2;
  string action = 3;
  string action_input = 4;
  string observation = 5;
  string phase = 6;  // "llm_thinking", "tool_executing", "tool_complete"
}

message AgentFinalEvent {
  string answer = 1;
  repeated AgentStep steps = 2;
  repeated AgentSource sources = 3;
}

message AgentErrorEvent {
  string message = 1;
}
