name: knowhub # オプション

# Dockerの標準ログ（docker logs で見るログ）の肥大化を防ぐ設定です。
# 開発環境でも長時間起動するとログが増えるため、1コンテナ最大約30MBに制限します。
x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

services:
  db: # サービス名
    container_name: mysql
    image: mysql:8.0 # キーと値
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    # Docker標準ログの肥大化防止です。共通設定 x-logging を参照します。
    logging: *default-logging
    ports:
      - '3306:3306' # リスト形式
    environment: # 環境変数（セクション）
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    volumes: # 永久保存
      - './data/mysql:/var/lib/mysql'

    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 5s
      timeout: 5s
      retries: 5

  migrator:
    # gooseを使ってDB migrationを実行する一回実行用コンテナです。
    # 普段は起動し続けず、必要な時に `docker compose run --rm migrator up` で実行します。
    build:
      context: .
      dockerfile: docker/migrator.Dockerfile
    logging: *default-logging
    environment:
      # migrator内のGoコードが mysql.Config.FormatDSN() で安全にDSNを組み立てます。
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MIGRATION_DIR: /migrations
    depends_on:
      db:
        condition: service_healthy

  cache: # サービス名
    container_name: redis
    image: redis:7 #
    # Redisの標準出力ログにもサイズ上限を付けます。
    logging: *default-logging
    ports:
      - '6379:6379'

    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  searxng:
    container_name: searxng
    image: searxng/searxng:latest
    # SearXNGのアクセス/エラーログが増えすぎないようにします。
    logging: *default-logging
    ports:
      - '8888:8080'
    volumes:
      - ./data/searxng:/etc/searxng:rw
